<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
        *{
            font-family: "Inter", sans-serif;
        }
        
    </style>
</head>
<body class="bg-base-300">
    <section class="mx-auto max-w-[1110px] ">
        
        <h3 class="text-[#002C5C] py-5 font-bold text-4xl">Job Appication Tracker</h3>
        <div class="grid grid-cols-4 gap-5">

            
            <div class="job-counters max-w-[359px] space-y-1 p-5 bg-base-100 rounded-(--radius-selector)">
                <p>total</p>
                <p class="font-extrabold text-4xl text-[#002C5C]">8</p>
            </div>
            <div class="job-counters max-w-[359px] space-y-1 p-5 bg-base-100 rounded-(--radius-selector)">
                <p>Applied</p>
                <p class="font-extrabold text-4xl">0</p>
            </div>
            <div class="job-counters max-w-[359px] space-y-1 p-5 bg-base-100 rounded-(--radius-selector)">
                <p>Interview</p>
                <p class="font-extrabold text-4xl">0</p>
            </div>
            <div class="job-counters max-w-[359px] space-y-1 p-5 bg-base-100 rounded-(--radius-selector)">
                <p>Rejected</p>
                <p class="font-extrabold text-4xl">0</p>
            </div>
        </div>
        <div class="divider"></div>
    </section>


    
</body>
</html>
